<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dikejar Wendigo - FPV Horror</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* UI Overlay */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: rgba(255,255,255,0.3);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; z-index: 10; cursor: pointer;
        }
        #ui-game {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 1.2rem; text-shadow: 2px 2px #000; pointer-events: none;
        }
        #jumpscare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff0000; font-size: 4rem; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            z-index: 20; display: none; text-shadow: 0 0 20px #ff0000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="instructions">
        <h1 style="color: #e74c3c;">🌲 TERJEBAK DI GOA WENDIGO 🌲</h1>
        <p>KLIK LAYAR UNTUK MEMULAI</p>
        <p style="font-size: 0.9rem; color: #aaa;">Kontrol: WASD (Jalan) + MOUSE (Melihat Sekitar)<br>Cari cahaya putih di ujung goa sebelum Wendigo menangkapmu!</p>
    </div>

    <div id="ui-game">
        Jarak ke Keluar: <span id="dist-text">150</span>m <br>
        <span id="warning-text" style="color: #ff4757; font-weight: bold; animation: blink 1s infinite;"></span>
    </div>

    <div id="jumpscare">WENDIGO MEMANGSAMU! 💀</div>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, flashlight;
        let wendigo, obstacles = [];
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0; // Untuk rotasi mouse
        let isXLocked = true;
        let gameActive = false, distanceToExit = 150;

        const player = { speed: 0.12, x: 0, z: 0 };

        // 1. Setup Awal Game
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.15); // Kabut tebal horror

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0); // Tinggi mata manusia (1.6m)

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Senter Player (SpotLight)
            flashlight = new THREE.SpotLight(0xfff9e6, 2, 25, Math.PI / 5, 0.5, 1);
            flashlight.position.set(0, 1.6, 0);
            scene.add(flashlight);
            scene.add(flashlight.target); // Senter punya arah target

            createCave();
            createWendigo();

            // Event Listeners
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            const inst = document.getElementById('instructions');
            inst.addEventListener('click', () => {
                inst.style.display = 'none';
                document.body.requestPointerLock();
                gameActive = true;
            });

            animate();
        }

        // 2. Membuat Lorong Goa Panjang
        function createCave() {
            // Lantai, Dinding, Atap Goa disatukan dalam satu rute silinder/kotak panjang
            const caveLength = 200;
            const geo = new THREE.BoxGeometry(8, 6, caveLength);
            const mat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.9, side: THREE.BackSide });
            const cave = new THREE.Mesh(geo, mat);
            cave.position.set(0, 2, -caveLength/2 + 5);
            scene.add(cave);

            // Tambah batu rintangan di jalan
            for(let i = -20; i > -180; i -= 15) {
                let obsGeo = new THREE.DodecahedronGeometry(0.6);
                let obsMat = new THREE.MeshStandardMaterial({color: 0x333333});
                let obs = new THREE.Mesh(obsGeo, obsMat);
                obs.position.set((Math.random() - 0.5) * 5, 0.3, i);
                scene.add(obs);
                obstacles.push(obs);
            }

            // Pintu Keluar (Cahaya Putih di ujung goa)
            const exitGeo = new THREE.BoxGeometry(8, 6, 1);
            const exitMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const exitGate = new THREE.Mesh(exitGeo, exitMat);
            exitGate.position.set(0, 2, -190);
            scene.add(exitGate);
        }

        // 3. Membuat Monster Wendigo Secara Prosedural (Tanpa perlu download file)
        function createWendigo() {
            wendigo = new THREE.Group();

            // Badan kurus tinggi hitam
            const bodyGeo = new THREE.CylinderGeometry(0.2, 0.1, 2.5);
            const blackMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            const body = new THREE.Mesh(bodyGeo, blackMat);
            body.position.y = 1.25;
            wendigo.add(body);

            // Kepala Tengkorak Putih
            const headGeo = new THREE.SphereGeometry(0.3, 8, 8);
            const whiteMat = new THREE.MeshBasicMaterial({ color: 0xcccccc });
            const head = new THREE.Mesh(headGeo, whiteMat);
            head.position.y = 2.6;
            wendigo.add(head);

            // Mata Merah Menyala (Glowing Eyes)
            const eyeGeo = new THREE.SphereGeometry(0.05, 4, 4);
            const redMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const leftEye = new THREE.Mesh(eyeGeo, redMat); leftEye.position.set(-0.1, 2.65, -0.25);
            const rightEye = new THREE.Mesh(eyeGeo, redMat); rightEye.position.set(0.1, 2.65, -0.25);
            wendigo.add(leftEye, rightEye);

            // Tanduk Rusa (Antlers) dari Box tipis
            const antlerMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            for(let i = -1; i <= 1; i += 2) {
                const horn = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.6, 0.05), antlerMat);
                horn.position.set(i * 0.2, 3.1, 0);
                horn.rotation.z = -i * 0.4;
                wendigo.add(horn);
            }

            // Taruh wendigo jauh di belakang player di awal game
            wendigo.position.set(0, 0, 15);
            scene.add(wendigo);
        }

        // 4. Kontrol Pergerakan & Mouse Look
        function onKeyDown(e) {
            if(!gameActive) return;
            if (e.code === 'KeyW' || e.code === 'ArrowUp') moveForward = true;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') moveBackward = true;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveLeft = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') moveRight = true;
        }
        function onKeyUp(e) {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') moveForward = false;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') moveBackward = false;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveLeft = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') moveRight = false;
        }
        function onMouseMove(e) {
            if (document.pointerLockElement !== document.body) return;
            // Sensitivitas gerak mouse
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch)); // Batas atas bawah
        }

        // 5. Update Logika Game Tiap Frame
        function update() {
            if (!gameActive) return;

            // Update Rotasi Kamera berdasarkan gerak Mouse
            camera.rotation.order = "YXZ";
            camera.rotation.set(pitch, yaw, 0);

            // Hitung Arah Jalan Player
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            // Jalan & Cek Batas Dinding Goa (Kiri/Kanan maksimal 3.5)
            if (moveForward) { camera.position.addScaledVector(forward, player.speed); }
            if (moveBackward) { camera.position.addScaledVector(forward, -player.speed); }
            if (moveLeft) { camera.position.addScaledVector(right, -player.speed); }
            if (moveRight) { camera.position.addScaledVector(right, player.speed); }
            
            // Batasi gerak player agar tidak tembus dinding goa kiri-kanan
            camera.position.x = Math.max(-3.5, Math.min(3.5, camera.position.x));

            // Senter menempel di kamera dan mengarah ke pandangan player
            flashlight.position.copy(camera.position);
            const targetPosition = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
            flashlight.target.position.copy(targetPosition);

            // AI WENDIGO: Dia bergerak lurus mengejar posisi Z player dengan kecepatan meningkat!
            let wendigoSpeed = 0.095 + (Math.abs(camera.position.z) * 0.0001); // Makin jauh makin cepat
            wendigo.position.z -= wendigoSpeed;
            // Wendigo bergeser perlahan mendekati X player agar terasa pintar
            wendigo.position.x += (camera.position.x - wendigo.position.x) * 0.02;
            
            // Efek jalan bergoyang untuk wendigo (creepy bobbing effect)
            wendigo.position.y = Math.sin(Date.now() * 0.01) * 0.1;

            // UI Info sisa jarak keluar
            distanceToExit = Math.ceil(190 + camera.position.z);
            document.getElementById('dist-text').innerText = distanceToExit > 0 ? distanceToExit : 0;

            // Peringatan Jarak Wendigo
            let jarakMonster = wendigo.position.z - camera.position.z;
            let warnEl = document.getElementById('warning-text');
            if(jarakMonster < 6) {
                warnEl.innerText = "WENDIGO TEPAT DI BELAKANGMU!!!";
            } else if(jarakMonster < 12) {
                warnEl.innerText = "Mendengar suara langkah kaki mendekat...";
            } else {
                warnEl.innerText = "";
            }

            // Cek Kalah (Wendigo berhasil menyentuh Player)
            if (jarakMonster <= 0.8) {
                gameActive = false;
                document.exitPointerLock();
                document.getElementById('jumpscare').style.display = 'flex';
                setTimeout(() => { location.reload(); }, 3000); // Reset game setelah 3 detik
            }

            // Cek Menang (Mencapai ujung goa)
            if (camera.position.z <= -189) {
                gameActive = false;
                document.exitPointerLock();
                document.getElementById('jumpscare').innerText = "KAMU BERHASIL KELUAR GOA! 🎉";
                document.getElementById('jumpscare').style.color = "#2ecc71";
                document.getElementById('jumpscare').style.display = 'flex';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
