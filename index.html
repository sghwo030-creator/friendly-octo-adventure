<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dark Hallway: Deep Insanity</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #020202;
            color: #dcdcdc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Efek Kegelapan Lorong */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.98);
            pointer-events: none;
            z-index: 10;
            transition: box-shadow 0.5s ease;
        }

        #game-container {
            width: 100%;
            max-width: 650px;
            padding: 30px;
            z-index: 2;
            border: 1px solid #1a1a1a;
            background: rgba(5, 5, 5, 0.85);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 2.2rem;
            color: #8b0000;
            text-shadow: 0 0 8px rgba(139, 0, 0, 0.6);
            margin-bottom: 25px;
            letter-spacing: 4px;
            font-weight: 900;
        }

        /* Status Bar (Sanity & Battery) */
        .status-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #0d0d0d;
            padding: 10px;
            border: 1px solid #222;
            font-size: 0.9rem;
        }

        .bar-wrapper {
            width: 45%;
            text-align: left;
        }

        .bar-bg {
            background: #222;
            height: 10px;
            width: 100%;
            margin-top: 5px;
            border: 1px solid #333;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        #sanity-bar { background-color: #0066cc; width: 100%; }
        #battery-bar { background-color: #cc9900; width: 100%; }

        .screen { display: none; }
        .active { display: block; }

        #story-text {
            min-height: 100px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            background-color: rgba(20, 0, 0, 0.4);
            color: #b3a2a2;
            border: 1px solid #551a1a;
            padding: 14px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background-color: #8b0000;
            color: #fff;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }

        button:disabled {
            border-color: #222;
            color: #444;
            cursor: not-allowed;
        }

        .full-width { grid-column: span 2; }

        /* Glitch & Effects */
        .flicker { animation: blink 0.15s infinite alternate; }
        @keyframes blink {
            0% { opacity: 0.2; }
            100% { opacity: 0.9; }
        }

        #jumpscare {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 999; visibility: hidden;
        }

        #jumpscare-text {
            color: #ff0000; font-size: 6rem; font-weight: 100;
            transform: scale(0.3); transition: transform 0.05s ease-out;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    
    <audio id="bgm" src="https://raw.githubusercontent.com/sghwo030-creator/friendly-octo-adventure/refs/heads/main/Cold_Linoleum_Floor.mp3" loop></audio>

    <div id="game-container">
        <div id="menu-screen" class="screen active">
            <h1>THE DARK HALLWAY</h1>
            <p style="margin-bottom: 25px; font-size: 0.95rem;">Lantai linoleum yang dingin menyerap kewarasanmu. Cari jalan keluar sebelum baterai senter atau pikiranmu habis.</p>
            <button class="full-width" onclick="startGame()">Masuk ke Kegelapan</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="status-container">
                <div class="bar-wrapper">
                    <span>Sanity: <span id="sanity-text">100</span>%</span>
                    <div class="bar-bg"><div id="sanity-bar" class="bar-fill"></div></div>
                </div>
                <div class="bar-wrapper">
                    <span>Senter: <span id="battery-text">100</span>%</span>
                    <div class="bar-bg"><div id="battery-bar" class="bar-fill"></div></div>
                </div>
            </div>

            <p id="story-text"></p>
            <p style="font-size: 0.85rem; color: #555; margin-bottom: 15px;" id="distance-text">Jarak: 0 meter</p>

            <div class="btn-group">
                <button id="btn-move" onclick="handleAction('move')">Maju ke Depan</button>
                <button id="btn-scavenge" onclick="handleAction('scavenge')">Cari Baterai</button>
                <button id="btn-flashlight" onclick="toggleFlashlight()">Senter: ON</button>
                <button id="btn-hide" onclick="handleAction('hide')" disabled>Sembunyi!</button>
            </div>
        </div>

        <div id="gameover-screen" class="screen">
            <h1 id="end-title">KAMU HILANG</h1>
            <p id="end-reason" style="margin-bottom: 25px;"></p>
            <button class="full-width" onclick="restartGame()">Coba Lagi</button>
        </div>
    </div>

    <div id="jumpscare">
        <div id="jumpscare-text">MENOLEH!</div>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        
        let state = {
            sanity: 100,
            battery: 100,
            distance: 0,
            flashlightOn: true,
            monsterAlert: false,
            turnsSinceAlert: 0
        };

        let isTyping = false;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function typeWriter(text, elementId, callback) {
            const el = document.getElementById(elementId);
            el.innerHTML = '';
            let i = 0;
            isTyping = true;
            disableButtons(true);

            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 20);
                } else {
                    isTyping = false;
                    disableButtons(false);
                    if(callback) callback();
                }
            }
            type();
        }

        function disableButtons(status) {
            document.getElementById('btn-move').disabled = status;
            document.getElementById('btn-scavenge').disabled = status;
            document.getElementById('btn-flashlight').disabled = status;
            if(!state.monsterAlert) document.getElementById('btn-hide').disabled = true;
            else if(!status) document.getElementById('btn-hide').disabled = false;
        }

        function updateUI() {
            state.sanity = Math.max(0, Math.min(100, state.sanity));
            state.battery = Math.max(0, Math.min(100, state.battery));

            document.getElementById('sanity-text').innerText = state.sanity;
            document.getElementById('battery-text').innerText = state.battery;
            document.getElementById('distance-text').innerText = `Jarak terlewati: ${state.distance} meter`;

            document.getElementById('sanity-bar').style.width = state.sanity + '%';
            document.getElementById('battery-bar').style.width = state.battery + '%';

            const shadowIntensity = 100 - (state.sanity * 0.4);
            document.getElementById('vignette').style.boxShadow = `inset 0 0 ${shadowIntensity}px rgba(0,0,0,0.98)`;

            // Mengurangi kecepatan lagu jika Sanity di bawah 40% (Efek Halusinasi)
            if (state.sanity < 40) {
                bgm.playbackRate = 0.75; 
                document.getElementById('game-screen').classList.add('flicker');
            } else {
                bgm.playbackRate = 1.0;
                document.getElementById('game-screen').classList.remove('flicker');
            }

            if (state.battery <= 0 && state.flashlightOn) {
                toggleFlashlight();
            }

            checkDeathConditions();
        }

        function toggleFlashlight() {
            if(isTyping) return;
            if(state.battery <= 0 && !state.flashlightOn) {
                return;
            }
            state.flashlightOn = !state.flashlightOn;
            document.getElementById('btn-flashlight').innerText = `Senter: ${state.flashlightOn ? 'ON' : 'OFF'}`;
            document.getElementById('btn-flashlight').style.color = state.flashlightOn ? '#cc9900' : '#444';
            updateUI();
        }

        function startGame() {
            bgm.play().catch(e => console.log("Audio play blocked or delayed. Wait for next interaction."));
            state = { sanity: 100, battery: 100, distance: 0, flashlightOn: true, monsterAlert: false, turnsSinceAlert: 0 };
            document.getElementById('btn-flashlight').innerText = "Senter: ON";
            updateUI();
            showScreen('game-screen');
            typeWriter("Kamu terjebak di koridor bawah tanah berlantai linoleum dingin. Senter di tanganmu menyala redup. Sesuatu berbisik lewat musik di kepalamu...", 'story-text');
        }

        function handleAction(action) {
            if(isTyping) return;

            let logMsg = "";

            if (state.flashlightOn) {
                state.battery -= Math.floor(Math.random() * 6) + 4; 
                state.sanity -= 2;
            } else {
                state.sanity -= Math.floor(Math.random() * 12) + 8; 
            }

            if (action === 'move') {
                state.distance += Math.floor(Math.random() * 4) + 3;
                logMsg = "Kamu memaksakan diri melangkah maju di atas linoleum dingin. ";
                
                if (state.monsterAlert) {
                    triggerJumpscare("Kamu mencoba lari, tapi makhluk itu bergerak lebih cepat dari bayanganmu.");
                    return;
                }

                if (state.distance >= 50) {
                    gameWin();
                    return;
                }

                if (Math.random() < 0.25 && state.distance > 10) {
                    state.monsterAlert = true;
                    state.turnsSinceAlert = 0;
                    logMsg += "TIBA-TIBA, suara detak sepatu berat terdengar tepat di belakangmu! Musiknya mendadak kacau! Sembunyi sekarang atau matikan senter!";
                }

            } else if (action === 'scavenge') {
                logMsg = "Kamu berhenti sejenak, meraba-raba area gelap di sudut dinding linoleum... ";
                if (Math.random() < 0.5) {
                    const foundBat = Math.floor(Math.random() * 25) + 15;
                    state.battery += foundBat;
                    logMsg += `Kamu menemukan baterai cadangan! (+${foundBat}% Baterai).`;
                } else {
                    state.sanity -= 10;
                    logMsg += "Kamu tidak menemukan apa pun selain debu dingin dan keputusasaan yang makin pekat.";
                }
            } else if (action === 'hide') {
                if (state.monsterAlert) {
                    if (!state.flashlightOn) {
                        state.monsterAlert = false;
                        logMsg = "Kamu menahan napas di dalam gelap gulita. Suara deru napas berat melewati tubuhmu lalu menghilang... Kamu aman sementara.";
                    } else {
                        logMsg = "Kamu mencoba bersembunyi tapi SENTERMU MASIH MENYALA! Makhluk itu melihat cahayamu!";
                        setTimeout(() => triggerJumpscare("Senter yang menyala menuntunnya langsung ke wajahmu."), 1500);
                    }
                }
            }

            if (state.monsterAlert && action !== 'hide') {
                state.turnsSinceAlert++;
                if (state.turnsSinceAlert > 1) {
                    triggerJumpscare("Waktumu habis. Sesuatu menarikmu dari belakang.");
                    return;
                }
            }

            updateUI();
            if(state.sanity > 0 && state.battery >= 0) {
                typeWriter(logMsg, 'story-text');
            }
        }

        function checkDeathConditions() {
            if (state.sanity <= 0) {
                showEndScreen("KAMU GILA", "Kewarasanmu hancur sepenuhnya. Kamu menjadi bagian dari koridor gelap ini selamanya.");
            }
        }

        function triggerJumpscare(reason) {
            const jsDiv = document.getElementById('jumpscare');
            const jsText = document.getElementById('jumpscare-text');
            bgm.pause();

            jsDiv.style.visibility = 'visible';
            jsText.style.transform = 'scale(2)';

            let count = 0;
            const flash = setInterval(() => {
                jsDiv.style.backgroundColor = count % 2 === 0 ? '#500' : '#000';
                count++;
                if (count > 8) clearInterval(flash);
            }, 40);

            setTimeout(() => {
                jsDiv.style.visibility = 'hidden';
                jsText.style.transform = 'scale(0.3)';
                showEndScreen("KAMU MATI", reason);
            }, 1000);
        }

        function showEndScreen(title, reason) {
            document.getElementById('end-title').innerText = title;
            document.getElementById('end-reason').innerText = reason;
            showScreen('gameover-screen');
        }

        function gameWin() {
            showEndScreen("KAMU SELAMAT", `Luar biasa, Jae! Kamu berhasil menempuh ${state.distance} meter melewati koridor maut dan menemukan pintu keluar ke dunia nyata.`);
        }

        function restartGame() {
            bgm.currentTime = 0;
            startGame();
        }
    </script>
</body>
</html>
