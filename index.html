<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dark Hallway: 3D First Person</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        /* WebGL Canvas untuk 3D */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay di atas 3D render */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border: 1px solid #222;
            pointer-events: auto;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .bar-bg {
            background: #222;
            width: 120px;
            height: 8px;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
            border: 1px solid #444;
        }

        .bar-fill { height: 100%; width: 100%; transition: width 0.2s; }
        #sanity-fill { background-color: #0066cc; }
        #battery-fill { background-color: #cc9900; }

        /* Layar Menu & Game Over */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050505;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        h1 {
            font-size: 3rem;
            color: #8b0000;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.8);
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        p { max-width: 500px; line-height: 1.6; margin-bottom: 30px; }

        button {
            background: transparent;
            color: #8b0000;
            border: 2px solid #8b0000;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            pointer-events: auto;
            transition: 0.3s;
        }

        button:hover {
            background: #8b0000;
            color: #fff;
            box-shadow: 0 0 15px #8b0000;
        }

        /* Panduan Kontrol */
        .controls-hint {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            color: #666;
            font-size: 0.85rem;
            text-align: center;
            margin-top: auto;
        }

        /* Jumpscare Screen */
        #jumpscare {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 999;
            display: flex; justify-content: center; align-items: center;
            visibility: hidden;
        }
        #jumpscare-text {
            color: #ff0000; font-size: 7rem; font-weight: bold; letter-spacing: 15px;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <audio id="bgm" src="https://raw.githubusercontent.com/sghwo030-creator/friendly-octo-adventure/refs/heads/main/Cold_Linoleum_Floor.mp3" loop></audio>

    <div id="menu-screen" class="screen">
        <h1>THE DARK HALLWAY</h1>
        <p>Gunakan tombol W, A, S, D untuk bergerak di dalam lorong 3D. Musik linoleum yang dingin mengintaimu dari kegelapan.</p>
        <button onclick="startGame()">Masuk Lorong 3D</button>
    </div>

    <div id="ui-layer" class="ui-overlay hidden">
        <div class="hud">
            <div>Sanity <div class="bar-bg"><div id="sanity-fill" class="bar-fill"></div></div></div>
            <div>Senter <div class="bar-bg"><div id="battery-fill" class="bar-fill"></div></div></div>
            <div id="distance-txt">Jarak: 0m</div>
        </div>
        <div class="controls-hint">
            [W/S] Maju/Mundur | [A/D] Tolak Kiri/Kanan | [SPACE] Senter ON/OFF | [E] Cari Baterai
        </div>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <h1 id="end-title">KAMU HILANG</h1>
        <p id="end-reason"></p>
        <button onclick="restartGame()">Coba Lagi</button>
    </div>

    <div id="jumpscare">
        <div id="jumpscare-text">MENOLEH!</div>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        let scene, camera, renderer, flashlight, ambientLight;
        let gameActive = false;
        
        // Game Systems State
        let state = { sanity: 100, battery: 100, distance: 0, flashlightOn: true };
        const keys = { w: false, a: false, s: false, d: false };

        // 3D Hallway Configuration
        const hallwayLength = 160;
        const speed = 0.08;
        const turnSpeed = 0.025;

        // Inisialisasi Dunia 3D Engine
        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.15); // Efek kabut kegelapan

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // Membuat Tekstur Lantai Linoleum secara Prosedural (Tanpa file gambar luar)
            const canvasTex = document.createElement('canvas');
            canvasTex.width = 256; canvasTex.height = 256;
            const ctx = canvasTex.getContext('2d');
            ctx.fillStyle = '#141414'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#222222'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 256, 256);
            
            const wallTexture = new THREE.CanvasTexture(canvasTex);
            wallTexture.wrapS = THREE.RepeatWrapping; wallTexture.wrapT = THREE.RepeatWrapping;
            wallTexture.repeat.set(2, 40);

            // Membuat Struktur Geometri Lorong (Box raksasa yang dibalik)
            const tunnelGeo = new THREE.BoxGeometry(4, 3.5, hallwayLength);
            const tunnelMat = new THREE.MeshStandardMaterial({
                map: wallTexture,
                roughness: 0.8,
                side: THREE.BackSide // Agar bagian dalam box yang terlihat
            });
            const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
            tunnel.position.set(0, 1.75, -hallwayLength / 2);
            scene.add(tunnel);

            // Pencahayaan Utama (Senter Player)
            flashlight = new THREE.SpotLight(0xfff6e0, 3, 18, Math.PI / 4, 0.6, 1);
            flashlight.castShadow = true;
            camera.add(flashlight);
            
            // Arah sorotan senter lurus ke depan kamera
            const targetObject = new THREE.Object3D();
            targetObject.position.set(0, 0, -1);
            camera.add(targetObject);
            flashlight.target = targetObject;

            // Cahaya ambient super redup untuk dekorasi kegelapan
            ambientLight = new THREE.AmbientLight(0x0a0a0a);
            scene.add(ambientLight);

            scene.add(camera);
            resetPlayerPosition();
        }

        function resetPlayerPosition() {
            camera.position.set(0, 1.6, 0); // Tinggi rata-rata mata manusia
            camera.rotation.set(0, 0, 0);
        }

        // Input Keyboard Listener
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
            
            if (e.code === 'Space' && gameActive) {
                e.preventDefault();
                toggleFlashlight();
            }
            if (key === 'e' && gameActive) {
                scavengeBattery();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        function toggleFlashlight() {
            if (state.battery <= 0 && !state.flashlightOn) return;
            state.flashlightOn = !state.flashlightOn;
            flashlight.intensity = state.flashlightOn ? 3 : 0;
        }

        function scavengeBattery() {
            // Mekanik cari baterai di tempat
            if(Math.random() < 0.4) {
                const bonus = Math.floor(Math.random() * 20) + 15;
                state.battery = Math.min(100, state.battery + bonus);
                state.sanity -= 5; 
            } else {
                state.sanity -= 10; // Mengurangi sanity jika zonk karena stres meraba kegelapan
            }
            updateHUD();
        }

        function startGame() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            
            bgm.play().catch(e => console.log("Audio play deferred."));
            
            state = { sanity: 100, battery: 100, distance: 0, flashlightOn: true };
            flashlight.intensity = 3;
            resetPlayerPosition();
            gameActive = true;
            
            updateHUD();
            animate();
        }

        // Core Game Loop Engine
        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // 1. Mekanik Pergerakan Pemain (3D Vector Translation)
            if (keys.w) camera.translateZ(-speed);
            if (keys.s) camera.translateZ(speed);
            if (keys.a) camera.rotation.y += turnSpeed;
            if (keys.d) camera.rotation.y -= turnSpeed;

            // Batasi agar player tidak menembus dinding kiri/kanan lorong
            camera.position.x = Math.max(-1.7, Math.min(1.7, camera.position.x));
            camera.position.z = Math.max(-hallwayLength + 2, Math.min(1, camera.position.z));

            // Hitung jarak berdasarkan posisi koordinat Z murni
            let currentDist = Math.floor(Math.abs(camera.position.z));
            if (currentDist !== state.distance) {
                state.distance = currentDist;
                updateHUD();
            }

            // 2. Simulasi Konsumsi Resource Senter & Sanity
            if (state.flashlightOn) {
                state.battery -= 0.025;
                state.sanity -= 0.005;
                
                // Efek Senter Berkedip secara acak jika baterai di bawah 35%
                if (state.battery < 35 && Math.random() < 0.08) {
                    flashlight.intensity = Math.random() > 0.5 ? 3 : 0.2;
                }
            } else {
                state.sanity -= 0.06; // Sanity ngedrop cepat jika gelap total
            }

            // Kecepatan musik melambat dramatis jika sanity hancur (Halusinasi)
            if (state.sanity < 40) {
                bgm.playbackRate = 0.75;
                if(Math.random() < 0.03) flashlight.intensity = 0.1; // Kegelapan mulai mengambil alih visual
            } else {
                bgm.playbackRate = 1.0;
            }

            // Auto-mati jika baterai 0
            if (state.battery <= 0 && state.flashlightOn) {
                state.battery = 0;
                toggleFlashlight();
            }

            updateHUD();
            checkGameConditions();
            renderer.render(scene, camera);
        }

        function updateHUD() {
            state.sanity = Math.max(0, state.sanity);
            state.battery = Math.max(0, state.battery);

            document.getElementById('sanity-fill').style.width = state.sanity + '%';
            document.getElementById('battery-fill').style.width = state.battery + '%';
            document.getElementById('distance-txt').innerText = `Jarak: ${state.distance}m / 100m`;
        }

        function checkGameConditions() {
            // Kalah karena gila
            if (state.sanity <= 0) {
                endGame("KAMU GILA", "Pikiranmu runtuh total ditelan kegelapan koridor linoleum.");
            }
            // Menang jika mencapai ujung lorong 3D (100 meter)
            if (state.distance >= 100) {
                endGame("KAMU SELAMAT", "Kamu melihat berkas cahaya fajar di ujung pintu keluar lorong. Kamu berhasil lolos!");
            }
            // Random Jumpscare Trigger jika nekat berjalan di kegelapan tanpa senter
            if (!state.flashlightOn && state.distance > 15 && Math.random() < 0.002) {
                triggerJumpscare("Sesuatu menerkammu tepat saat sentermu mati padam.");
            }
        }

        function triggerJumpscare(reason) {
            gameActive = false;
            bgm.pause();
            
            const js = document.getElementById('jumpscare');
            js.style.visibility = 'visible';

            // Efek kedip visual jumpscare merah-hitam kilat
            let f = 0;
            const flash = setInterval(() => {
                js.style.backgroundColor = f % 2 === 0 ? '#600' : '#000';
                f++; if(f > 10) clearInterval(flash);
            }, 30);

            setTimeout(() => {
                js.style.visibility = 'hidden';
                endGame("KAMU MATI", reason);
            }, 1100);
        }

        function endGame(title, reason) {
            gameActive = false;
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('end-title').innerText = title;
            document.getElementById('end-reason').innerText = reason;
            document.getElementById('gameover-screen').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameover-screen').classList.add('hidden');
            bgm.currentTime = 0;
            startGame();
        }

        // Handle ukuran window browser dinamis demi menjaga aspek rasio 3D
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Jalankan inisialisasi engine 3D saat file di-load
        init3D();
    </script>
</body>
</html>
