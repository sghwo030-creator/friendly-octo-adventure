<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabur dari Goa 3D!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        h1 { margin: 0 0 5px 0; font-size: 1.8rem; text-shadow: 2px 2px 4px #000; }
        .status { font-size: 1.1rem; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; }
        #screen-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 3px 3px 6px #000;
            z-index: 10;
            display: none;
        }
        .btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .btn:hover { background: #c0392b; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>🏃‍♂️ KABUR DARI GOA 3D! 👹</h1>
        <div class="status">
            Sisa Jarak: <span id="distance">100</span>m | Status Monster: <span id="monster-status" style="color:#ff4757; font-weight:bold;">Mengejar</span>
        </div>
    </div>

    <div id="screen-text"></div>
    <button class="btn" onclick="resetGame()">Main Lagi</button>

    <script>
        // Setup Dasar Three.js
        let scene, camera, renderer;
        let player, monster, obstacles = [];
        let gameSpeed = 0.15;
        let distance = 100;
        let isGameOver = false;
        let isGameWon = false;

        // Logika Lompat
        let isJumping = false;
        let jumpVelocity = 0;
        const gravity = 0.01;

        function init() {
            // 1. Scene & Fog (Suasana Goa Gelap)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            scene.fog = new THREE.FogExp2(0x1a1a1a, 0.035);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3.5, 6); // Posisi kamera di belakang agak ke atas
            camera.lookAt(0, 1, -5);

            // 3. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 4. Pencahayaan (Lighting)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffaa44, 1, 30); // Lampu obor goa
            pointLight.position.set(0, 5, -2);
            scene.add(pointLight);

            // 5. Membuat Tanah Goa (Ground)
            const groundGeo = new THREE.BoxGeometry(10, 1, 100);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 }); // Cokelat tua batuan
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = -0.5;
            scene.add(ground);

            // 6. Membuat Dinding Goa kiri kanan biar terasa di dalam goa
            const wallGeo = new THREE.BoxGeometry(1, 10, 100);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x2d1f1d });
            const leftWall = new THREE.Mesh(wallGeo, wallMat);
            leftWall.position.set(-4.5, 4, 0);
            const rightWall = new THREE.Mesh(wallGeo, wallMat);
            rightWall.position.set(4.5, 4, 0);
            scene.add(leftWall, rightWall);

            // 7. Karakter Player (Kubus Biru)
            const playerGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0x3498db });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 0.6, 0); // Berdiri di atas tanah
            scene.add(player);

            // 8. Monster (Kubus Besar Merah Berpaku di Belakang)
            const monsterGeo = new THREE.BoxGeometry(2, 3, 2);
            const monsterMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
            monster = new THREE.Mesh(monsterGeo, monsterMat);
            monster.position.set(0, 1.5, 5); // Berada di belakang player (Z positif)
            scene.add(monster);

            resetGame();
            animate();
        }

        function resetGame() {
            // Reset Variabel
            distance = 100;
            isGameOver = false;
            isGameWon = false;
            gameSpeed = 0.15;
            player.position.set(0, 0.6, 0);
            monster.position.set(0, 1.5, 5); // Jarak awal monster di belakangmu
            
            // Hapus rintangan lama
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];

            document.getElementById('screen-text').style.display = 'none';
            document.getElementById('monster-status').innerText = "Mengejar";
            document.getElementById('monster-status').style.color = "#ff4757";
        }

        // Input Kontrol (Spasi / Klik Layar untuk Lompat)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isJumping && !isGameOver && !isGameWon) {
                jumpVelocity = 0.22;
                isJumping = true;
            }
        });
        window.addEventListener('touchstart', () => {
            if (!isJumping && !isGameOver && !isGameWon) {
                jumpVelocity = 0.22;
                isJumping = true;
            }
        });

        function spawnObstacle() {
            // Probabilitas munculnya batu goa di depan
            if (Math.random() < 0.015 && obstacles.length < 5) {
                const obsGeo = new THREE.DodecahedronGeometry(0.5); // Bentuk batu tidak beraturan
                const obsMat = new THREE.MeshStandardMaterial({ color: 0x7f8c8d });
                const obs = new THREE.Mesh(obsGeo, obsMat);
                
                // Muncul jauh di depan (Z negatif)
                obs.position.set((Math.random() - 0.5) * 2, 0.4, -40); 
                scene.add(obs);
                obstacles.push(obs);
            }
        }

        function update() {
            if (isGameOver || isGameWon) return;

            // 1. Kurangi sisa jarak keluar goa
            distance -= 0.03;
            if (distance <= 0) {
                distance = 0;
                isGameWon = true;
                showScreen("KAMU BERHASIL KELUAR! 🎉", "#2ecc71");
            }
            document.getElementById('distance').innerText = Math.ceil(distance);

            // 2. Fisika Lompat Player
            if (isJumping) {
                player.position.y += jumpVelocity;
                jumpVelocity -= gravity;
                if (player.position.y <= 0.6) {
                    player.position.y = 0.6;
                    isJumping = false;
                }
            }

            // 3. Monster merayap maju perlahan secara konstan
            monster.position.z -= 0.01;

            // 4. Gerakkan Rintangan (Batu) mendekati Player
            spawnObstacle();
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += gameSpeed; // Batu bergerak mundur ke arah player
                obstacles[i].rotation.x += 0.02; // Efek batu menggelinding

                // Cek Tabrakan (AABB super simpel)
                let pBox = new THREE.Box3().setFromObject(player);
                let oBox = new THREE.Box3().setFromObject(obstacles[i]);

                if (pBox.intersectsBox(oBox)) {
                    // Jika tabrak batu, player terhambat, monster langsung maju pesat!
                    monster.position.z -= 1.5; 
                    document.getElementById('monster-status').innerText = "SANGAT DEKAT!! 💀";
                    
                    // Hapus batu yang ditabrak agar tidak terkena hit berkali-kali
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    continue;
                }

                // Hapus batu yang sudah lewat di belakang kamera
                if (obstacles[i].position.z > 8) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                }
            }

            // 5. Cek jika monster berhasil menerkam Player (Monster menyusul posisi Z Player)
            if (monster.position.z <= player.position.z + 0.5) {
                isGameOver = true;
                showScreen("KAMU DIMAKAN MONSTER! 👹❌", "#e74c3c");
            }
        }

        function showScreen(text, color) {
            const el = document.getElementById('screen-text');
            el.innerText = text;
            el.style.color = color;
            el.style.display = 'block';
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // Jalankan game saat window selesai memuat
        window.onload = init;

        // Auto-resize grafis 3D saat ukuran layar berubah (responsif hp/laptop)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
