<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dikejar Wendigo - Real 3D Cave</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px; background: rgba(255,255,255,0.2);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0505 0%, #000000 100%); color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; z-index: 10; cursor: pointer;
        }
        #ui-game {
            position: absolute; top: 20px; left: 20px; color: #e74c3c;
            font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none;
            letter-spacing: 1px;
        }
        #jumpscare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff0000; font-size: 3.5rem; font-weight: bold;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; display: none; text-shadow: 0 0 30px #ff0000;
        }
        .subtitle { font-size: 1rem; color: #fff; margin-top: 20px; font-weight: normal; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="instructions">
        <h1 style="color: #ff3333; font-size: 2.5rem; margin-bottom: 0;">GOA WENDIGO 3D</h1>
        <p style="color: #888; margin-top: 5px;">[ Versi Batuan Goa Realistis ]</p>
        <p style="font-size: 1.2rem; animation: blink 1.5s infinite; margin: 30px 0;">KLIK LAYAR UNTUK MASUK GOA</p>
        <p style="font-size: 0.85rem; color: #bbb; line-height: 1.6;">
            Kontrol: <strong>W, A, S, D</strong> untuk Bergerak<br>
            Arahkan <strong>Mouse</strong> untuk melihat sekeliling<br>
            <span style="color: #ffaa00;">Tips: Senter tua milikmu agak rusak dan bisa berkedip!</span>
        </p>
    </div>

    <div id="ui-game">
        SISA JARAK: <span id="dist-text">150</span>m<br>
        <span id="warning-text" style="color: #ffffff; font-size: 1rem;"></span>
    </div>

    <div id="jumpscare">
        <div>WENDIGO MENEMUKANMU</div>
        <div class="subtitle">Mati di dalam kegelapan... (Loading Restart)</div>
    </div>
    
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, flashlight;
        let wendigo, obstacles = [];
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0;
        let gameActive = false, distanceToExit = 150;
        let caveLength = 180;

        const player = { speed: 0.11, x: 0, z: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.18); // Kabut super gelap

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Senter (SpotLight) Horror dengan sudut tajam
            flashlight = new THREE.SpotLight(0xfff5dd, 3, 22, Math.PI / 6, 0.6, 1.2);
            scene.add(flashlight);
            scene.add(flashlight.target);

            // Lampu ambient super redup biar bayangan batu kelihatan estetik
            const ambient = new THREE.AmbientLight(0x0a0a10, 0.3);
            scene.add(ambient);

            generateProceduralCave();
            createWendigo();

            // Event Listeners
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            const inst = document.getElementById('instructions');
            inst.addEventListener('click', () => {
                inst.style.display = 'none';
                document.body.requestPointerLock();
                gameActive = true;
            });

            animate();
        }

        // --- MODIFIKASI UTAMA: MEMBUAT DINDING BATU ASLI (PROCEDURAL) ---
        function generateProceduralCave() {
            // Material batu yang merespon cahaya dengan efek kasar (roughness)
            const rockMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x222222, 
                roughness: 0.95,
                metalness: 0.1
            });

            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x151515,
                roughness: 0.9
            });

            // Buat tanah mendatar
            const groundGeo = new THREE.BoxGeometry(10, 0.2, caveLength + 20);
            const ground = new THREE.Mesh(groundGeo, groundMaterial);
            ground.position.set(0, 0, -caveLength/2);
            scene.add(ground);

            // Bangun dinding kiri, kanan, dan atap menggunakan ratusan susunan batu acak
            for (let z = 10; z > -caveLength - 10; z -= 2.5) {
                
                // Jumlah batu per baris diperbanyak agar padat
                for (let i = 0; i < 5; i++) {
                    // Pakai Dodecahedron (Segi-12) agar bentuknya mirip bongkahan batu alami
                    let rockSize = 1.5 + Math.random() * 1.5;
                    let rockGeo = new THREE.DodecahedronGeometry(rockSize);

                    // Dinding Kiri
                    let leftRock = new THREE.Mesh(rockGeo, rockMaterial);
                    leftRock.position.set(-4.5 - Math.random()*1, Math.random() * 5, z + (Math.random() - 0.5));
                    leftRock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    scene.add(leftRock);

                    // Dinding Kanan
                    let rightRock = new THREE.Mesh(rockGeo, rockMaterial);
                    rightRock.position.set(4.5 + Math.random()*1, Math.random() * 5, z + (Math.random() - 0.5));
                    rightRock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    scene.add(rightRock);

                    // Atap Goa (Langit-langit)
                    let roofRock = new THREE.Mesh(rockGeo, rockMaterial);
                    roofRock.position.set((Math.random() - 0.5) * 8, 5 + Math.random()*0.5, z);
                    roofRock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    scene.add(roofRock);
                }

                // Spawns batu rintangan di tengah jalan secara acak
                if (z < -15 && z > -caveLength + 10 && Math.random() < 0.25) {
                    let obsGeo = new THREE.DodecahedronGeometry(0.5 + Math.random()*0.3);
                    let obsMat = new THREE.MeshStandardMaterial({ color: 0x2d2d2d, roughness: 0.9 });
                    let obs = new THREE.Mesh(obsGeo, obsMat);
                    obs.position.set((Math.random() - 0.5) * 4.5, 0.4, z);
                    scene.add(obs);
                    obstacles.push(obs);
                }
            }

            // Gerbang Keluar Kabur (Cahaya Putih Terang Harapan)
            const exitGeo = new THREE.BoxGeometry(10, 6, 0.5);
            const exitMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const exitGate = new THREE.Mesh(exitGeo, exitMat);
            exitGate.position.set(0, 3, -caveLength);
            scene.add(exitGate);
        }

        // --- MEMBUAT WENDIGO LEBIH SERAM ---
        function createWendigo() {
            wendigo = new THREE.Group();

            // Badan kurus tinggi bayangan hitam
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.05, 2.8), new THREE.MeshBasicMaterial({ color: 0x020202 }));
            body.position.y = 1.4;
            wendigo.add(body);

            // Kepala Tengkorak Hewan
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.5), new THREE.MeshBasicMaterial({ color: 0xdddddd }));
            head.position.set(0, 2.8, -0.1);
            wendigo.add(head);

            // Mata Merah Menyala Terang Terbakar kabut
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), eyeMat); leftEye.position.set(-0.12, 2.85, -0.36);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), eyeMat); rightEye.position.set(0.12, 2.85, -0.36);
            wendigo.add(leftEye, rightEye);

            // Tanduk Rusa Besar Bercabang (Antlers)
            const antlerMat = new THREE.MeshBasicMaterial({ color: 0x0a0a0a });
            for (let i = -1; i <= 1; i += 2) {
                const mainHorn = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.8, 0.04), antlerMat);
                mainHorn.position.set(i * 0.2, 3.3, -0.1);
                mainHorn.rotation.z = -i * 0.5;
                mainHorn.rotation.x = -0.2;
                
                // Cabang tanduk kecil
                const branch = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.3, 0.03), antlerMat);
                branch.position.set(0, 0.2, 0);
                branch.rotation.z = i * 0.8;
                mainHorn.add(branch);
                
                wendigo.add(mainHorn);
            }

            wendigo.position.set(0, 0, 12); // Mulai di belakang player
            scene.add(wendigo);
        }

        function onKeyDown(e) {
            if(!gameActive) return;
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
        }
        function onKeyUp(e) {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
        }
        function onMouseMove(e) {
            if (document.pointerLockElement !== document.body) return;
            yaw -= e.movementX * 0.0022;
            pitch -= e.movementY * 0.0022;
            pitch = Math.max(-Math.PI / 2.3, Math.min(Math.PI / 2.3, pitch));
        }

        function update() {
            if (!gameActive) return;

            // Kamera / Kepala rotasi
            camera.rotation.order = "YXZ";
            camera.rotation.set(pitch, yaw, 0);

            // Kalkulasi arah jalan FPS
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            // Gerak & tabrakan batas dinding batu kiri/kanan
            if (moveForward) camera.position.addScaledVector(forward, player.speed);
            if (moveBackward) camera.position.addScaledVector(forward, -player.speed);
            if (moveLeft) camera.position.addScaledVector(right, -player.speed);
            if (moveRight) camera.position.addScaledVector(right, player.speed);
            
            camera.position.x = Math.max(-3.2, Math.min(3.2, camera.position.x));

            // Senter dipasang presisi di posisi mata player
            flashlight.position.copy(camera.position);
            const targetPos = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
            flashlight.target.position.copy(targetPos);

            // --- EFEK HORROR: Senter Rusak Berkedip (Flicker) ---
            if (Math.random() < 0.015) { 
                flashlight.intensity = 0; // Senter mati total sesaat
            } else if (Math.random() < 0.08) {
                flashlight.intensity = 0.5 + Math.random() * 1.5; // Redup bergetar
            } else {
                flashlight.intensity = 3.5; // Terang normal
            }

            // AI WENDIGO: Berlari konstan dan makin mendekat
            let chaseSpeed = 0.088 + (Math.abs(camera.position.z) * 0.00012);
            wendigo.position.z -= chaseSpeed;
            wendigo.position.x += (camera.position.x - wendigo.position.x) * 0.03;

            // Efek bergidik bahu Wendigo saat mengejar
            wendigo.position.y = Math.abs(Math.sin(Date.now() * 0.012)) * 0.15;

            // Update Sisa Jarak UI
            distanceToExit = Math.ceil(caveLength + camera.position.z);
            document.getElementById('dist-text').innerText = distanceToExit > 0 ? distanceToExit : 0;

            // Logika Indikator Suara/Teror Wendigo
            let distanceToMonster = wendigo.position.z - camera.position.z;
            let warnEl = document.getElementById('warning-text');
            if (distanceToMonster < 5) {
                warnEl.innerText = "HEMBUSAN NAFASNYA ADA DI BELAKANGMU!!! 👹";
                warnEl.style.color = "#ff0000";
            } else if (distanceToMonster < 11) {
                warnEl.innerText = "*Suara tulang bergemeletuk makin keras..*";
                warnEl.style.color = "#ffaa00";
            } else {
                warnEl.innerText = "*Lari!! Jangan menoleh ke belakang!*";
                warnEl.style.color = "#888888";
            }

            // Cek Kalah (Ketangkap)
            if (distanceToMonster <= 0.7) {
                gameActive = false;
                document.exitPointerLock();
                document.getElementById('jumpscare').style.display = 'flex';
                setTimeout(() => { location.reload(); }, 3500);
            }

            // Cek Menang (Keluar)
            if (camera.position.z <= -caveLength + 0.5) {
                gameActive = false;
                document.exitPointerLock();
                const js = document.getElementById('jumpscare');
                js.innerHTML = "<div>KAMU BERHASIL SELAMAT! 🎉</div><div class='subtitle'>Kamu lolos dari cengkeraman kutukan Wendigo.</div>";
                js.style.color = "#2ecc71";
                js.style.textShadow = "0 0 20px #2ecc71";
                js.style.display = 'flex';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
