<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabur dari Goa!</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: #2c1d11; /* Warna dalam goa */
            border: 4px solid #5c3a21;
            display: block;
            margin: 20px auto;
            max-width: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }
        .status {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .btn {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h1>🏃‍♂️ KABUR DARI GOA! 👹</h1>
    <p>Tekan <strong>TOMBOL SPASI</strong> atau <strong>TAP LAYAR</strong> untuk melompat. Jangan sampai menabrak batu atau monster akan menangkapmu!</p>
    
    <div class="status">
        Sisa Jarak Keluar: <span id="distance">100</span>m | 
        Jarak Monster: <span id="monster-dist">Dekat</span>
    </div>

    <canvas id="gameCanvas" width="800" height="300"></canvas>
    <br>
    <button class="btn" onclick="resetGame()">Main Lagi</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Variabel Game
        let player, monster, obstacles, gameSpeed, distance, isGameOver, isGameWon;
        const gravity = 0.6;

        function resetGame() {
            player = { x: 180, y: 200, width: 30, height: 40, vy: 0, isJumping: false, color: '#3498db' };
            monster = { x: 20, width: 60, height: 80, color: '#e74c3c' };
            obstacles = [];
            gameSpeed = 5;
            distance = 100; // Target jarak untuk menang
            isGameOver = false;
            isGameWon = false;
            document.getElementById('distance').innerText = distance;
        }

        // Input Kontrol (Spasi & Touch)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !player.isJumping && !isGameOver) {
                player.vy = -12;
                player.isJumping = true;
            }
        });
        canvas.addEventListener('touchstart', () => {
            if (!player.isJumping && !isGameOver) {
                player.vy = -12;
                player.isJumping = true;
            }
        });

        function spawnObstacle() {
            if (Math.random() < 0.02 && obstacles.length < 3) {
                obstacles.push({
                    x: canvas.width,
                    y: 210,
                    width: 20,
                    height: 30,
                    color: '#7f8c8d'
                });
            }
        }

        function update() {
            if (isGameOver || isGameWon) return;

            // Update Jarak Keluar Goa
            distance -= 0.05;
            if (distance <= 0) {
                distance = 0;
                isGameWon = true;
            }
            document.getElementById('distance').innerText = Math.ceil(distance);

            // Logika Player (Lompat & Gravitasi)
            player.vy += gravity;
            player.y += player.vy;
            if (player.y >= 200) {
                player.y = 200;
                player.vy = 0;
                player.isJumping = false;
            }

            // Monster otomatis mendekat perlahan
            monster.x += 0.3;

            // Update Rintangan (Batu)
            spawnObstacle();
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                // Cek Tabrakan Player dengan Batu
                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y
                ) {
                    // Jika tabrak batu, monster langsung maju pesat!
                    monster.x += 40; 
                    player.color = '#f1c40f'; // Efek kaget/terluka sementara
                    setTimeout(() => player.color = '#3498db', 300);
                    obstacles.splice(i, 1);
                    continue;
                }

                // Hapus batu yang lolos dari layar
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                }
            }

            // Hitung teks jarak monster untuk UI
            let selisih = player.x - (monster.x + monster.width);
            document.getElementById('monster-dist').innerText = selisih > 100 ? "Jauh" : (selisih > 40 ? "Mendekat!" : "KRITIS!! 💀");

            // Cek jika Monster berhasil menangkap Player
            if (monster.x + monster.width >= player.x) {
                isGameOver = true;
            }
        }

        function draw() {
            // Bersihkan layar
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar Tanah Goa
            ctx.fillStyle = '#1e120a';
            ctx.fillRect(0, 240, canvas.width, 60);

            // Gambar Monster
            ctx.fillStyle = monster.color;
            ctx.fillRect(monster.x, monster.y, monster.width, monster.height);
            // Mata monster biar seram
            ctx.fillStyle = '#fff';
            ctx.fillRect(monster.x + monster.width - 15, monster.y + 20, 10, 10);

            // Gambar Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Gambar Rintangan (Batu-batu goa)
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Teks Menang / Kalah
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e74c3c';
                ctx.font = '40px sans-serif';
                ctx.fillText('KAMU DIMAKAN MONSTER! X_X', canvas.width/2 - 260, canvas.height/2);
            } else if (isGameWon) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#2ecc71';
                ctx.font = '40px sans-serif';
                ctx.fillText('KAMU BERHASIL KELUAR GOA! 🎉', canvas.width/2 - 280, canvas.height/2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Mulai Game pertama kali
        resetGame();
        gameLoop();
    </script>
</body>
</html>
